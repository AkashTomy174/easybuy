{% extends "base.html" %}

{% block title %}Access Denied{% endblock %}

{% block content %}
<section class="mx-auto flex min-h-[60vh] max-w-3xl items-center justify-center px-6 py-16">
    <div class="w-full rounded-3xl border border-stone-200 bg-white p-10 text-center shadow-sm dark:border-stone-700 dark:bg-surface-dark">
        <p class="text-sm font-black uppercase tracking-[0.3em] text-rose-500">403</p>
        <h1 class="mt-4 text-3xl font-black text-stone-900 dark:text-white">Access denied</h1>
        <p class="mt-4 text-sm font-semibold text-stone-500 dark:text-stone-300">
            {{ message|default:"You do not have permission to access this resource." }}
        </p>
        <a href="{% url 'home' %}" class="mt-8 inline-flex items-center justify-center rounded-2xl bg-primary px-6 py-3 text-sm font-black text-white transition hover:opacity-90">
            Return home
        </a>
    </div>
</section>
{% endblock %}
